name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # Smoke test: the built stdio server must answer an MCP initialize.
      - name: MCP introspection smoke test
        run: |
          RESPONSE=$( (printf '%s\n' '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}'; sleep 2) | node dist/index.js 2>/dev/null | head -1 )
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"name":"memeboat"'
